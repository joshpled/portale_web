name: CI

# Gate every PR into main (and verify main itself after a squash merge) on
# typecheck + lint + production build. Add `ci` as a required status check in
# the branch protection rule so PRs can't merge red.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel an in-progress run when new commits land on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: typecheck · lint · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
